<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Head Section: Contains metadata, title, and stylesheet link -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cafe Menu</title>
    <link href="CoffeeMenu.css" rel="stylesheet"/>
  </head>
  <body>
    <!-- Body Section: Contains the main content of the webpage -->
    <div class="menu">
      <main>
        <!-- Main Section: Cafe Menu -->
        <h1>CAMPER CAFE</h1>
        <p class="established">Est. 2020</p>
        <hr> <!-- Horizontal line separator -->
        
        <!-- Section: Coffee Menu -->
        <section>
          <h2>Coffee</h2>
          <img src="https://cdn.freecodecamp.org/curriculum/css-cafe/coffee.jpg" alt="coffee icon"/>
          
          <!-- Coffee items with flavor and price -->
          <article class="item">
            <p class="flavor">French Vanilla</p><p class="price">3.00</p>
          </article>
          <article class="item">
            <p class="flavor">Caramel Macchiato</p><p class="price">3.75</p>
          </article>
          <article class="item">
            <p class="flavor">Pumpkin Spice</p><p class="price">3.50</p>
          </article>
          <article class="item">
            <p class="flavor">Hazelnut</p><p class="price">4.00</p>
          </article>
          <article class="item">
            <p class="flavor">Mocha</p><p class="price">4.50</p>
          </article>
        </section>
        
        <!-- Section: Desserts Menu -->
        <section>
          <h2>Desserts</h2>
          <img src="https://cdn.freecodecamp.org/curriculum/css-cafe/pie.jpg" alt="pie icon"/>
          
          <!-- Dessert items with name and price -->
          <article class="item">
            <p class="dessert">Donut</p><p class="price">1.50</p>
          </article>
          <article class="item">
            <p class="dessert">Cherry Pie</p><p class="price">2.75</p>
          </article>
          <article class="item">
            <p class="dessert">Cheesecake</p><p class="price">3.00</p>
          </article>
          <article class="item">
            <p class="dessert">Cinnamon Roll</p><p class="price">2.50</p>
          </article>
        </section>
      </main>

      <!-- Horizontal line separator -->
      <hr class="bottom-line">

      <!-- Footer Section: Contains website link and address -->
      <footer>
        <p>
          <!-- Link to the website -->
          <a href="https://www.freecodecamp.org" target="_blank">Visit our website</a>
        </p>
        <p class="address">123 Free Code Camp Drive</p>
      </footer>
    </div>
  </body>
</html>
