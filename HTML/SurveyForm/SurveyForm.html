<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Registration Form</title>
    <link rel="stylesheet" href="SurveyForm.css" />
  </head>
  <body>
    <h1>freeCodeCamp Survey Form</h1>
    <p>Thank you for taking the time to help us improve the platform</p>
    <form method="post" action='https://register-demo.freecodecamp.org'>
      <fieldset>
        <label for="name">Name<input id="name" name="name" type="text" required /></label>
        <label for="email">Email<input id="email" name="email" type="text" required /></label>
        <label for="age">Age<input id="age" name="age" type="age" required /></label>
        <label for="role">Which option best describes your current role?
            <select id="role" name="role">
            <option value="">Select current role</option>
            <option value="1">Student</option>
            <option value="2">Full Time Job</option>
            <option value="3">Full Time Learner</option>
            <option value="4">Prefer Not To Say</option>
            <option value="5">Other</option>
        </select>
        </label>
        
      </fieldset>
      <fieldset>
        <legend>Would you recommend freeCodeCamp to a friend?</legend>
        <label for="definitely"><input id="definitely" type="radio" name="reccomendation-type" class="inline" checked /> Definitely</label>
        <label for="Maybe"><input id="Maybe" type="radio" name="reccomendation-type" class="inline" /> Maybe</label>
        <label for="not sure"><input id="not sure" type="radio" name="reccomendation-type" class="inline" /> Not sure</label>
      </fieldset>
      <fieldset>
        <label for="feature">What is your favorite feature of freeCodeCamp?
           <select id="role" name="role">
            <option value="">Select an option</option>
            <option value="1">Challenges</option>
            <option value="2">Projects</option>
            <option value="3">Community</option>
            <option value="4">Open Source</option>
        </select> 
        </label>
        <legend>What would you like to see improved? (Check all that apply)
            <label for="">Front-end Projects<input type="checkbox"></label>
            <label for="">Back-end Projects<input type="checkbox"></label>
            <label for="">Data Visualization<input type="checkbox"></label>
            <label for="">Challenges<input type="checkbox"></label>
            <label for="">Open Source Community<input type="checkbox"></label>
            <label for="">Gitter help rooms<input type="checkbox"></label>
            <label for="">Videos<input type="checkbox"></label>
            <label for="">City Meetups<input type="checkbox"></label>
            <label for="">Wiki<input type="checkbox"></label>
            <label for="">Forum<input type="checkbox"></label>
            <label for="">Additional Courses<input type="checkbox"></label>
        </legend>
         </label>
        <label for="bio">Any comments or suggestions?
          <textarea id="bio" name="bio" rows="3" cols="30" placeholder="Enter your comment here..."></textarea>
        </label>
      </fieldset>
      <input type="submit" value="Submit" />
    </form>
  </body>
</html>
