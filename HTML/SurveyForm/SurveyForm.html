<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="SurveyForm.css">
  <title>Survey Form</title>
</head>
<body>

  <div class="container">
    <h1 id="title">Survey Form</h1>
    <p id="description">Please fill out the survey form below:</p>

    <form id="survey-form">
        <fieldset>
            <!--NAME-->
            <label id="name-label" for="name">Name:</label>
            <input type="text" id="name" name="name" placeholder="Enter your name" required>
            
            <!--EMAIL-->
            <label id="email-label" for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>

            <!--AGE-->
            <label id="age-label" for="age">Age:</label>
            <input type="age" id="age" name="age" placeholder="Age" min="1" max="100" required>

            <!--MULTIPLE OPTIONS FOR ROLE-->
            <label for="dropdown">Which option best describes your current role?</label>
            <select id="dropdown" name="dropdown">
                <option value="">Select current role</option>
                <option value="1">Student</option>
                <option value="2">Full Time Job</option>
                <option value="3">Full Time Learner</option>
                <option value="4">Prefer Not To Say</option>
                <option value="5">Other</option>
            </select>
        </fieldset>

        <fieldset>
            <label class="reccomend">Would you recommend freeCodeCamp to a friend?
              <input type="radio" name="radio-group" value="option1"> Definitely
              <input type="radio" name="radio-group" value="option2"> Maybe
              <input type="radio" name="radio-group" value="option1"> Not sure
            </label>
        </fieldset>

        <fieldset>
            <label for="feature">What is your favorite feature of freeCodeCamp?
                <select id="role" name="role">
                 <option value="">Select an option</option>
                 <option value="1">Challenges</option>
                 <option value="2">Projects</option>
                 <option value="3">Community</option>
                 <option value="4">Open Source</option>
             </select> 
             </label>

             <label>
             <legend>What would you like to see improved? (Check all that apply)
               <label for="">Front-end Projects<input type="checkbox"></label>
               <label for="">Back-end Projects<input type="checkbox"></label>
               <label for="">Data Visualization<input type="checkbox"></label>
               <label for="">Challenges<input type="checkbox"></label>
               <label for="">Open Source Community<input type="checkbox"></label>
               <label for="">Gitter help rooms<input type="checkbox"></label>
               <label for="">Videos<input type="checkbox"></label>
               <label for="">City Meetups<input type="checkbox"></label>
               <label for="">Wiki<input type="checkbox"></label>
               <label for="">Forum<input type="checkbox"></label>
               <label for="">Additional Courses<input type="checkbox"></label>
           </legend>
           </label>
           <label for="comments">Any comments or suggestions?
            <textarea id="bio" name="bio" rows="10" cols="30" placeholder="Enter your comment here..."></textarea>
            </label>
        </fieldset>
        <fieldset>
            
      
        </fieldset>
      <button type="submit" id="submit">Submit</button>
    </form>
  </div>

</body>
</html>
